<!DOCTYPE html><html><head><meta charset=utf-8><meta http-equiv=X-UA-Compatible content="IE=edge"><meta name=viewport content="width=device-width,initial-scale=1,user-scalable=no"><link rel="shortcut icon" href=/template/kefu/default/favicon.ico><link rel=stylesheet href=https://g.alicdn.com/de/prismplayer/2.13.2/skins/default/aliplayer-min.css><link href=/template/kefu/default/static/css/chunk-vendors.b0b202ec.css rel=stylesheet><link href=/template/kefu/default/static/css/app.1e6ad76e.css rel=stylesheet><link rel="shortcut icon" href="../../assets/cloned/images/d88b2fff6a-1ffc51b781801f5fd682c491dedabfcc.png" type="image/x-icon">
<title>客服系统</title></head><body><noscript><strong>请开启 JavaScript 功能来使用 。</strong></noscript><div id=app></div><script src=https://g.alicdn.com/de/prismplayer/2.13.2/aliplayer-min.js></script><script src=/template/kefu/default/static/js/chunk-vendors.cb292ed6.js></script><script src=/template/kefu/default/static/js/app.c026890e.js></script></body><script>// // 首屏加载速度
        // window.onload= function() {
        //  console.log(new Date().getTime() - performance.timing.navigationStart,'首屏加载速度')
        // }
    function IEVersion() {
        var userAgent = navigator.userAgent; //取得浏览器的userAgent字符串
        var isIE =
            userAgent.indexOf("compatible") > -1 && userAgent.indexOf("MSIE") > -1; //判断是否IE<11浏览器
        if (isIE) {
            return true;
        } else {
            return false; //不是ie浏览器
        }
    }
    /* 如果是ie浏览器 */
    if (IEVersion()) {
        document.querySelector('#IEIframe').style.display = 'block'
        document.querySelector('#app').style.display = 'none'

    }
    // dataset 方法兼容 IE 浏览器。ie10及以下不支持dataset
    if (window.HTMLElement) {
        if (Object.getOwnPropertyNames(HTMLElement.prototype).indexOf('dataset') === -1) {
            Object.defineProperty(HTMLElement.prototype, 'dataset', {
                get: function () {
                    var attributes = this.attributes // 获取节点的所有属性
                    var name = []
                    var value = [] // 定义两个数组保存属性名和属性值
                    var obj = {} // 定义一个空对象
                    for (var i = 0; i < attributes.length; i++) { // 遍历节点的所有属性
                        if (attributes[i].nodeName.slice(0, 5) === 'data-') { // 如果属性名的前面5个字符符合"data-"
                            // 取出属性名的"data-"的后面的字符串放入name数组中
                            name.push(attributes[i].nodeName.slice(5));
                            // 取出对应的属性值放入value数组中
                            value.push(attributes[i].nodeValue);
                        }
                    }
                    for (var j = 0; j < name.length; j++) { // 遍历name和value数组
                        obj[name[j]] = value[j]; // 将属性名和属性值保存到obj中
                    }
                    return obj // 返回对象
                }
            })
        }
    }</script></html>
