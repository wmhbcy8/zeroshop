{{ include "partials/header.html" }}

<main class="page article-page">
  {{{ breadcrumb_html }}}
  <article class="content">
    <h1>{{ page.title }}</h1>
    {{ if page.summary }}
      <p class="lead">{{ page.summary }}</p>
    {{ /if }}
    {{ if page.cover }}
      <img class="cover" src="{{ page.cover }}" alt="{{ page.title }}">
    {{ /if }}
    <div class="richtext">
      {{{ page.content }}}
    </div>
  </article>
</main>

{{ include "partials/footer.html" }}
