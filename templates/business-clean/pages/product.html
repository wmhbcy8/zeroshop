{{ include "partials/header.html" }}

<main class="page product-page">
  {{{ breadcrumb_html }}}
  <section class="product-detail">
    <div>
      <img class="product-image" src="{{ product.cover }}" alt="{{ product.title }}">
    </div>
    <div>
      <a class="back-link" href="index.html">返回产品列表</a>
      <h1>{{ product.title }}</h1>
      <p class="sku">SKU: {{ product.sku }}</p>
      <p class="summary">{{ product.summary }}</p>
      <p class="price large">￥{{ product.price }}</p>
      <div class="richtext">
        {{{ product.description }}}
      </div>

      <div class="product-actions-panel">
        <form class="order-form" data-api="/api/orders">
          <input type="hidden" name="product_id" value="{{ product.id }}">
          <input type="hidden" name="title" value="{{ product.title }}">
          <input type="hidden" name="sku" value="{{ product.sku }}">
          <input type="hidden" name="price" value="{{ product.price }}">
          <input type="hidden" name="currency" value="{{ site.payment.currency }}">
          <div class="form-grid compact">
            <input type="text" name="customer_name" placeholder="姓名" required>
            <input type="tel" name="phone" placeholder="电话" required>
          </div>
          <div class="form-grid compact">
            <input type="email" name="email" placeholder="邮箱">
            <input type="number" name="quantity" min="1" value="1" placeholder="数量">
          </div>
          <input type="text" name="address" placeholder="收货地址或项目地址">
          <textarea name="remark" placeholder="补充采购需求、发票、配送或项目说明"></textarea>
          <button type="submit">立即下单</button>
          <p class="form-status" data-order-status></p>
          <div class="order-receipt" data-order-receipt hidden></div>
        </form>

        <form class="inquiry-form" data-api="/api/forms/submit">
          <input type="hidden" name="form_key" value="product_inquiry">
          <input type="hidden" name="product_id" value="{{ product.id }}">
          <input type="text" name="name" placeholder="姓名">
          <input type="tel" name="phone" placeholder="电话">
          <input type="email" name="email" placeholder="邮箱">
          <textarea name="message" placeholder="请留下您的采购需求"></textarea>
          <button type="submit">提交询盘</button>
        </form>
      </div>
    </div>
  </section>
  {{{ related_html }}}
</main>

{{ include "partials/footer.html" }}
