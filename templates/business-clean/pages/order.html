{{ include "partials/header.html" }}

<main class="page">
  <section class="page-title order-title">
    <span class="eyebrow">Order</span>
    <h1>订单查询</h1>
    <p>输入订单号和下单手机号，查看支付、发货和物流状态。</p>
  </section>

  <section class="order-lookup-panel" data-order-lookup-page>
    <form class="order-lookup-form" data-api="/api/orders/lookup">
      <input type="text" name="order_no" placeholder="订单号，例如 ZS202607080336396B571B" required>
      <input type="tel" name="phone" placeholder="下单手机号" required>
      <button type="submit">查询订单</button>
    </form>

    <div class="order-lookup-status" data-order-lookup-status>请输入订单信息开始查询。</div>
    <div class="order-lookup-result" data-order-lookup-result></div>
  </section>
</main>

{{ include "partials/footer.html" }}
