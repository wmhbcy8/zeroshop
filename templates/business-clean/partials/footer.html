  <footer class="site-footer">
    <div>
      <strong>{{ site.name }}</strong>
      <p>{{ site.description }}</p>
      <nav class="footer-nav">
        {{ each site.footer_nav }}
          <a href="{{ item.url }}">{{ item.title }}</a>
        {{ /each }}
      </nav>
    </div>
    <div>
      <p>电话：{{ site.phone }}</p>
      <p>邮箱：{{ site.email }}</p>
      <p>地址：{{ site.address }}</p>
    </div>
  </footer>
  {{{ floating_actions }}}
  <script src="{{ asset 'js/main.js' }}"></script>
</body>
</html>
