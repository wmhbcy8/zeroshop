services:
  mysql:
    image: mysql:8.4.10
    container_name: huajian-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${HJ_DB_PASSWORD:-huajian-root}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 3s
      timeout: 3s
      retries: 30
    volumes:
      - huajian-mysql-data:/var/lib/mysql

volumes:
  huajian-mysql-data:
